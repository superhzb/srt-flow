name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Ruff config lives at the repo root (pyproject.toml [tool.ruff]) and is
      # discovered upward from every package, so a single run covers all of them.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  backend:
    runs-on: ubuntu-latest
    env:
      ENV: dev
      AUTH_MODE: dev
    defaults:
      run:
        working-directory: srt-backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --all-extras
      - run: uv run pyright
      # No LLM_BACKENDS/DEEPSEEK_API_KEY set: exercises translate_segments
      # with a fake LLMBackend only, never a live cloud/mlx endpoint.
      - run: uv run pytest -q

  pkg-translator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: srt-backend/pkg-translator
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run pyright
      - run: uv run pytest -q

  pkg-llm-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: srt-backend/pkg-llm-backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run pyright
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: srt-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: srt-frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
